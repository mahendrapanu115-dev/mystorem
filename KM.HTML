<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mera Online Store</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    padding:0;
    background:#f5f5f5;
}
header{
    background:#007bff;
    color:white;
    text-align:center;
    padding:20px;
}
.container{
    max-width:1000px;
    margin:auto;
    padding:20px;
}
.product{
    background:white;
    border-radius:10px;
    padding:15px;
    margin:15px;
    display:inline-block;
    width:280px;
    text-align:center;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.product img{
    width:100%;
    border-radius:10px;
}
.price{
    color:green;
    font-size:22px;
    font-weight:bold;
}
.btn{
    display:inline-block;
    padding:10px 15px;
    margin:5px;
    color:white;
    text-decoration:none;
    border-radius:5px;
}
.buy{
    background:green;
}
.whatsapp{
    background:#25D366;
}
</style>
</head>

<body>

<header>
    <h1>Mera Online Store</h1>
    <p>Best Products at Best Price</p>
</header>

<div class="container">

    <div class="product">
        <img src="images/chana.jpg" alt="Roasted Chana">
        <h2>Product Name</h2>
        <p class="price">₹150</p>

        <a class="btn buy"
        href="upi://pay?pa=yourupi@upi&pn=Store&am=499">
        Pay Now
        </a>

        <a class="btn whatsapp"
        href="https://wa.me/919601393176?text=Hello%20I%20want%20to%20buy%20Product%20Name">
        Order on WhatsApp
        </a>
    </div>

</div>

</body>
</html>
